version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      # Minor and patch updates grouped together (safe to batch)
      minor-patch:
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "typescript"
          - "next"
          - "@types/*"
      # TypeScript gets its own PR (doesn't follow SemVer)
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      # Next.js ecosystem together
      nextjs:
        patterns:
          - "next"
          - "eslint-config-next"
          - "@next/*"
    # Major versions always get individual PRs (not grouped)
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
